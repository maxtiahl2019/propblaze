[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_DEMO_MODE = "false"
  NEXT_PUBLIC_APP_URL = "https://propblaze.com"
  NEXT_PUBLIC_API_URL = "https://propblaze.com"
  # ─── Set in Netlify Dashboard → Site Settings → Environment Variables ───
  # ⚠️  NEVER commit real values here. Use Netlify UI or CLI.
  #
  # SERVER-ONLY (not exposed to browser):
  # RESEND_API_KEY             — Resend.com API key
  # RESEND_FROM_EMAIL          — Sender address (e.g. hello@propblaze.com)
  # TELEGRAM_BOT_TOKEN         — Telegram bot token
  # TELEGRAM_CHAT_ID           — Owner Telegram chat ID
  # ANTHROPIC_API_KEY          — Claude AI (generate-pack, assistant, apex-demo)
  # OPENAI_API_KEY             — OpenAI fallback (optional)
  # SUPABASE_SERVICE_ROLE_KEY  — Supabase service role (server-only, never public!)
  # STRIPE_SECRET_KEY          — Stripe secret key
  # STRIPE_WEBHOOK_SECRET      — Stripe webhook signing secret
  # NEXTAUTH_SECRET            — NextAuth.js signing secret
  #
  # PUBLIC (safe to expose, set in Netlify UI as "public"):
  # NEXT_PUBLIC_SUPABASE_URL        — Supabase project URL
  # NEXT_PUBLIC_SUPABASE_ANON_KEY   — Supabase anon key (safe, RLS enforced)
  # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
  # NEXT_PUBLIC_STRIPE_PRICE_STARTER
  # NEXT_PUBLIC_STRIPE_PRICE_PROFESSIONAL
  # NEXT_PUBLIC_STRIPE_PRICE_PREMIUM
