name: Build & Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          DEMO_MODE: true
          NEXT_PUBLIC_APP_URL: https://propblaze.com

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --dir=out --prod --message "Deploy from GitHub Actions"
        env:
          NETLIFY_SITE_ID: 68662dc7-dad6-484e-95fb-c11682739ccc
          NETLIFY_AUTH_TOKEN: nfp_BjUtUrnhRjqnx63XuxhEJ5spsDpXQyiQb793
